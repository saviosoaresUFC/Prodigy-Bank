services:
  # App Fastify
  app:
    build: .
    container_name: fastify_app
    command: sh -c "npx prisma migrate dev --name init && node --import ./instrumentation.mjs server.js"
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://user_fastify:password_fastify@postgres:5432/fastify_db
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - JWT_SECRET=sua_chave_ultra_secreta
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastify_network

  # Postgres
  postgres:
    image: postgres:15
    container_name: fastify_postgres
    command: [ "postgres", "-c", "log_statement=all", "-c", "listen_addresses=*" ]
    environment:
      POSTGRES_USER: user_fastify
      POSTGRES_PASSWORD: password_fastify
      POSTGRES_DB: fastify_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user_fastify -d fastify_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - fastify_network

  # PG Admin
  pgadmin:
    image: dpage/pgadmin4
    container_name: fastify_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - fastify_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: fastify_redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - fastify_network

  # Jaeger (OpenTelemetry Backend)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: fastify_jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - fastify_network

networks:
  fastify_network:
    driver: bridge
